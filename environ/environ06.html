<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>environ 06</title>

  <link rel="stylesheet" href="environ06.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="environ06.js" defer></script>
</head>

<body>

  <h1>sleepy frog pond</h1>

  <p>
    click the frog, hover over the flower, click the cloud, and press space.
  </p>

  <div id="pond">

    <div id="frog">🐸</div>

    <div id="flower">🌷</div>

    <div id="cloud">☁️</div>

    <div id="message">
      the flower is hiding a little note
    </div>

  </div>

  <p id="status">
    the pond is just sitting here.
  </p>

</body>
</html>
